<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Is that day today?</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fafaf7;
    --fg: #1a1a1a;
    --accent: #16a34a;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0f1110; --fg: #f5f5f0; --accent: #4ade80; }
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }
  .question {
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 500;
    margin: 0 0 1.5rem;
    max-width: 24ch;
    line-height: 1.2;
  }
  .answer {
    font-size: clamp(5rem, 22vw, 14rem);
    font-weight: 900;
    color: var(--accent);
    margin: 0;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .hint {
    margin-top: 3rem;
    font-size: 0.9rem;
    opacity: 0.55;
    max-width: 32ch;
  }
  code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: color-mix(in srgb, var(--fg) 10%, transparent);
    padding: 0.1em 0.35em;
    border-radius: 0.25rem;
  }
</style>
</head>
<body>
<h1 class="question" id="q">Is it day today?</h1>
<p class="answer" id="a">YES</p>
<p class="hint" id="h" hidden>
  Try <code>isthatday.today/workout</code> or <code>?day=laundry</code>.
</p>
<script>
  const params = new URLSearchParams(location.search);
  const fromQuery = params.get("day") ?? params.get("name");
  const fromPath = decodeURIComponent(location.pathname).replace(/^\/+|\/+$/g, "");
  const raw = (fromQuery ?? fromPath).replace(/[-_+]+/g, " ").trim();
  const name = raw.toLowerCase();

  const q = document.getElementById("q");
  const h = document.getElementById("h");

  if (name) {
    q.textContent = `Is it ${name} day today?`;
    document.title = `Is it ${name} day today? YES`;
  } else {
    h.hidden = false;
  }
</script>
</body>
</html>
