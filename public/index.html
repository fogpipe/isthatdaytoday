<style>
  :root {
    color-scheme: light dark;
    --bg: #fafaf7;
    --fg: #1a1a1a;
    --accent: #16a34a;
    --display: "Fraunces", Georgia, "Times New Roman", serif;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --ink-soft: color-mix(in srgb, var(--fg) 58%, transparent);
    --ink-faint: color-mix(in srgb, var(--fg) 22%, transparent);
    --rule: color-mix(in srgb, var(--fg) 16%, transparent);
    --paper: color-mix(in srgb, var(--fg) 5%, var(--bg));
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0f1110; --fg: #f5f5f0; --accent: #4ade80; }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
  }
  [hidden] { display: none !important; }

  /* ---------- ANSWER VIEW (the /day pages) ---------- */
  body.view-answer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .emoji {
    font-size: clamp(3rem, 12vw, 7rem);
    line-height: 1;
    margin: 0 0 1rem;
  }
  .question {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 60, "WONK" 0;
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 500;
    font-style: italic;
    margin: 0 0 1.25rem;
    max-width: 22ch;
    line-height: 1.15;
    letter-spacing: -0.005em;
  }
  .q-link {
    color: inherit;
    text-decoration: none;
  }
  .q-link:hover .question {
    text-decoration: underline;
    text-decoration-color: color-mix(in srgb, var(--fg) 35%, transparent);
    text-underline-offset: 0.15em;
  }
  .answer {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 0, "WONK" 1;
    font-size: clamp(5rem, 22vw, 14rem);
    font-weight: 900;
    color: var(--accent);
    margin: 0;
    letter-spacing: -0.04em;
    line-height: 0.92;
  }
  .share {
    margin-top: 2.5rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: inherit;
    background: transparent;
    border: 1.5px solid var(--ink-faint);
    border-radius: 999px;
    padding: 0.7rem 1.6rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .share:hover {
    border-color: var(--fg);
    background: color-mix(in srgb, var(--fg) 8%, transparent);
  }
  .share.copied {
    border-color: var(--accent);
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 10%, transparent);
  }
  .ad {
    margin-top: 2.5rem;
    width: min(400px, 90vw);
  }

  /* ---------- COMPOSER (root editor view) ---------- */
  body.view-edit {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100dvh;
  }
  .composer {
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    gap: clamp(1.25rem, 3vw, 2.25rem);
    padding: 1.25rem clamp(1rem, 4vw, 2.5rem) 2rem;
    max-width: 72rem;
    width: 100%;
    margin: 0 auto;
  }

  .canvas {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: clamp(1rem, 3vw, 1.75rem);
    padding: clamp(1rem, 5vw, 3rem) 0.5rem;
  }

  .emoji-slot {
    min-height: 4rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .composer-emoji-btn {
    width: clamp(3.5rem, 9vw, 5.5rem);
    height: clamp(3.5rem, 9vw, 5.5rem);
    border-radius: 50%;
    border: 1.5px dashed var(--ink-faint);
    background: transparent;
    color: var(--ink-soft);
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, transform 0.12s, background 0.15s;
  }
  .composer-emoji-btn:hover {
    border-color: var(--fg);
    color: var(--fg);
    transform: scale(1.04);
  }
  .composer-emoji-btn:not(.empty) {
    border-style: solid;
    border-color: color-mix(in srgb, var(--accent) 65%, transparent);
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    font-size: clamp(2rem, 5.5vw, 3.25rem);
  }

  .composer .question {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 70, "WONK" 0;
    font-size: clamp(1.9rem, 6.5vw, 4.75rem);
    font-weight: 500;
    font-style: italic;
    line-height: 1.05;
    margin: 0;
    max-width: 22ch;
    letter-spacing: -0.01em;
    color: var(--fg);
  }
  .day-input {
    font: inherit;
    font-style: normal;
    font-weight: 800;
    font-variation-settings: "opsz" 144, "SOFT" 20, "WONK" 1;
    color: var(--accent);
    background: transparent;
    border: 0;
    border-bottom: 3px solid color-mix(in srgb, var(--accent) 80%, transparent);
    padding: 0 0.15em 0.02em;
    margin: 0 0.05em;
    text-align: center;
    outline: none;
    min-width: 3ch;
    field-sizing: content;
    caret-color: var(--accent);
    border-radius: 0;
  }
  .day-input::placeholder { color: var(--ink-faint); font-style: italic; font-weight: 400; }
  .day-input:focus {
    border-bottom-color: var(--accent);
    border-bottom-style: solid;
  }

  .answer-input {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 0, "WONK" 1;
    font-size: clamp(4.5rem, 20vw, 12rem);
    font-weight: 900;
    color: var(--accent);
    background: transparent;
    border: 0;
    outline: none;
    text-align: center;
    letter-spacing: -0.04em;
    line-height: 0.9;
    text-transform: uppercase;
    min-width: 2ch;
    max-width: 100%;
    field-sizing: content;
    padding: 0 0.05em;
    caret-color: var(--accent);
  }
  .answer-input:focus {
    background: color-mix(in srgb, var(--accent) 6%, transparent);
    border-radius: 0.4rem;
  }

  .cond-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.55rem;
    margin-top: 0.5rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--ink-soft);
  }
  .cond-label {
    letter-spacing: 0.05em;
  }
  .cond-sep { color: var(--ink-faint); }
  .date-input {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--fg);
    background: transparent;
    border: 0;
    border-bottom: 2px solid color-mix(in srgb, var(--fg) 25%, transparent);
    padding: 0.15rem 0.25rem;
    outline: none;
    color-scheme: light dark;
  }
  .date-input:focus { border-bottom-color: var(--accent); }
  .answer-input-small {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 0, "WONK" 1;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    background: transparent;
    border: 0;
    outline: none;
    text-align: center;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    min-width: 2ch;
    max-width: 8ch;
    field-sizing: content;
    padding: 0 0.15em;
    caret-color: var(--accent);
    border-bottom: 2px solid color-mix(in srgb, var(--accent) 50%, transparent);
  }
  .answer-input-small:focus { border-bottom-color: var(--accent); }
  .cond-remove {
    font: inherit;
    font-size: 1rem;
    line-height: 1;
    width: 1.5rem;
    height: 1.5rem;
    border: 1px solid var(--ink-faint);
    border-radius: 50%;
    background: transparent;
    color: inherit;
    cursor: pointer;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 0.25rem;
  }
  .cond-remove:hover { border-color: var(--fg); color: var(--fg); }
  .cond-toggle {
    align-self: center;
    margin-top: 0.75rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: transparent;
    border: 1px dashed var(--ink-faint);
    border-radius: 999px;
    padding: 0.45rem 0.95rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .cond-toggle:hover { border-color: var(--fg); color: var(--fg); }

  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    border-top: 1px solid var(--rule);
    padding-top: 1.25rem;
  }
  .swatches {
    display: flex;
    gap: clamp(0.75rem, 2vw, 1.5rem);
    align-items: flex-end;
  }
  .swatch-field {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.45rem;
    position: relative;
  }
  .swatch-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .swatch-btn {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    border: 2px solid color-mix(in srgb, var(--fg) 80%, transparent);
    cursor: pointer;
    padding: 0;
    position: relative;
    transition: transform 0.12s, box-shadow 0.15s;
    box-shadow: inset 0 0 0 2px var(--bg);
  }
  .swatch-btn:hover {
    transform: scale(1.08);
    box-shadow: inset 0 0 0 2px var(--bg), 0 0 0 3px color-mix(in srgb, var(--fg) 18%, transparent);
  }
  .swatch-input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    border: 0;
    padding: 0;
  }

  .go-btn {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--fg);
    border: 0;
    border-radius: 999px;
    padding: 1rem 2rem;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    transition: transform 0.12s, background 0.15s;
  }
  .go-btn:hover { transform: translateY(-1px); background: var(--accent); color: var(--bg); }
  .go-btn::after {
    content: "→";
    display: inline-block;
    font-size: 1.05rem;
    transition: transform 0.18s;
  }
  .go-btn:hover::after { transform: translateX(4px); }

  .presets {
    border-top: 1px solid var(--rule);
    padding-top: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }
  .presets-head {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .presets-label {
    font-family: var(--mono);
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .presets-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(8.5rem, 1fr));
    gap: 0.6rem;
  }
  .preset {
    font-family: var(--display);
    font: inherit;
    padding: 0.9rem 0.95rem;
    border: 1px solid color-mix(in srgb, var(--fg) 18%, transparent);
    border-radius: 0.5rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 0.55rem;
    text-align: left;
    transition: transform 0.15s, border-color 0.15s;
    min-height: 5.4rem;
    position: relative;
    overflow: hidden;
  }
  .preset:hover {
    transform: translateY(-2px);
    border-color: color-mix(in srgb, var(--fg) 38%, transparent);
  }
  .preset-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    min-width: 0;
  }
  .preset-emoji {
    font-size: 1.3rem;
    line-height: 1;
    font-family: system-ui, sans-serif;
  }
  .preset-day {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 50, "WONK" 0;
    font-style: italic;
    font-weight: 600;
    font-size: 1rem;
    line-height: 1;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .preset-answer {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 0, "WONK" 1;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 0.9;
    align-self: flex-end;
    text-align: right;
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .random-btn {
    font: inherit;
    font-size: 1rem;
    line-height: 1;
    width: 2rem;
    height: 2rem;
    border: 1px dashed var(--ink-faint);
    border-radius: 50%;
    background: transparent;
    color: inherit;
    cursor: pointer;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.18s, border-color 0.15s;
  }
  .random-btn:hover {
    transform: rotate(20deg) scale(1.08);
    border-color: var(--fg);
  }

  /* ---------- EMOJI MODAL (shared) ---------- */
  .modal {
    position: fixed;
    inset: 0;
    background: color-mix(in srgb, var(--fg) 60%, transparent);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }
  .modal-card {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--rule);
    border-radius: 0.6rem;
    width: min(95vw, 34rem);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    padding: 1rem;
    gap: 0.85rem;
    box-shadow: 0 30px 80px -20px color-mix(in srgb, #000 40%, transparent);
  }
  .modal-header {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .emoji-search {
    flex: 1;
    font-family: var(--mono);
    font-size: 0.95rem;
    color: inherit;
    background: transparent;
    border: 0;
    border-bottom: 2px solid var(--ink-faint);
    padding: 0.5rem 0.2rem;
    outline: none;
  }
  .emoji-search:focus { border-bottom-color: var(--accent); }
  .modal-action {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: inherit;
    background: transparent;
    border: 1px solid var(--ink-faint);
    border-radius: 999px;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
  }
  .modal-action:hover { background: color-mix(in srgb, var(--fg) 10%, transparent); }
  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(2.4rem, 1fr));
    gap: 0.15rem;
    overflow-y: auto;
    flex: 1;
    min-height: 12rem;
  }
  .emoji-cell {
    font-size: 1.5rem;
    line-height: 1;
    padding: 0.35rem;
    background: transparent;
    border: 0;
    border-radius: 0.3rem;
    cursor: pointer;
    font-family: system-ui, sans-serif;
  }
  .emoji-cell:hover { background: color-mix(in srgb, var(--fg) 12%, transparent); }
  .emoji-empty {
    text-align: center;
    opacity: 0.5;
    padding: 1rem;
    grid-column: 1 / -1;
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  /* ---------- ACTIVE PRESET BADGE (root, on conditional preset dates) ---------- */
  .active-preset {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    margin: 1.5rem auto 0;
    padding: 0.7rem 1.15rem;
    width: max-content;
    max-width: calc(100% - 2rem);
    font-family: var(--display);
    font-style: italic;
    font-variation-settings: "opsz" 144, "SOFT" 50, "WONK" 0;
    font-size: clamp(1rem, 2.4vw, 1.2rem);
    font-weight: 500;
    line-height: 1.2;
    text-decoration: none;
    border: 1px solid color-mix(in srgb, currentColor 22%, transparent);
    border-radius: 999px;
    transition: transform 0.15s, border-color 0.15s;
  }
  .active-preset:hover {
    transform: translateY(-1px);
    border-color: color-mix(in srgb, currentColor 55%, transparent);
  }
  .active-preset-emoji {
    font-family: system-ui, sans-serif;
    font-style: normal;
    font-size: 1.25em;
    line-height: 1;
  }
  .active-preset-day {
    font-variation-settings: "opsz" 144, "SOFT" 20, "WONK" 1;
    font-weight: 800;
  }
  .active-preset-arrow {
    font-family: var(--mono);
    font-style: normal;
    opacity: 0.6;
    margin-left: 0.15rem;
    font-size: 0.85em;
  }

  /* ---------- FOOTER ---------- */
  .site-footer {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.5rem 1.25rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  body.view-answer .site-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
  }
  .footer-link {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid var(--ink-faint);
    padding-bottom: 1px;
  }
  .footer-link:hover { color: var(--fg); border-bottom-color: var(--fg); }

  @media (max-width: 540px) {
    .controls { justify-content: center; flex-direction: column; gap: 1.25rem; }
    .swatches { gap: 1.5rem; }
    .go-btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<!-- Answer view (rendered for /<day> URLs) -->
<div class="emoji" id="e" hidden></div>
<a class="q-link" id="ql" href="/" hidden><h1 class="question" id="q">Is it day today?</h1></a>
<p class="answer" id="a" hidden>YES</p>
<button class="share" id="s" type="button" hidden>Share</button>
<div class="ad" id="ad" hidden>
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1833872657216386"
       data-ad-slot="5919153076"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<!-- Active conditional preset badge (rendered for / when today matches a preset date) -->
<a class="active-preset" id="active-preset" hidden></a>

<!-- Composer view (rendered for /) -->
<main class="composer" id="composer" hidden>
  <form class="canvas" id="f" novalidate>
    <div class="emoji-slot">
      <button id="emi-btn" type="button" class="composer-emoji-btn empty" aria-label="Pick emoji">＋ emoji</button>
      <input id="emi" type="hidden">
    </div>

    <h1 class="question">
      Is it
      <input id="i" class="day-input" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="?" aria-label="Day name">
      day today?
    </h1>

    <input id="ai" class="answer-input" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" value="YES" aria-label="Answer">

    <div class="cond-row" id="cond-row" hidden>
      <span class="cond-label">on</span>
      <input id="di" class="date-input" type="date" aria-label="Date">
      <span class="cond-sep">·</span>
      <span class="cond-label">otherwise</span>
      <input id="ai2" class="answer-input-small" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" value="NO" aria-label="Answer when date doesn't match">
      <button type="button" class="cond-remove" id="cond-remove" aria-label="Remove date condition">×</button>
    </div>
    <button type="button" class="cond-toggle" id="cond-toggle">+ date condition</button>
  </form>

  <div class="controls">
    <div class="swatches">
      <div class="swatch-field">
        <span class="swatch-label">Ink</span>
        <button type="button" class="swatch-btn" id="qci-btn" aria-label="Question color"></button>
        <input id="qci" type="color" class="swatch-input" tabindex="-1" aria-hidden="true">
      </div>
      <div class="swatch-field">
        <span class="swatch-label">Accent</span>
        <button type="button" class="swatch-btn" id="ci-btn" aria-label="Answer color"></button>
        <input id="ci" type="color" class="swatch-input" tabindex="-1" aria-hidden="true">
      </div>
      <div class="swatch-field">
        <span class="swatch-label">Paper</span>
        <button type="button" class="swatch-btn" id="bgi-btn" aria-label="Background"></button>
        <input id="bgi" type="color" class="swatch-input" tabindex="-1" aria-hidden="true">
      </div>
    </div>
    <button type="submit" form="f" class="go-btn" id="go-btn">Publish</button>
  </div>

  <section class="presets">
    <div class="presets-head">
      <span class="presets-label">Examples</span>
      <button type="button" class="random-btn" id="random-btn" aria-label="Random example">🎲</button>
    </div>
    <div class="presets-list" id="presets"></div>
  </section>
</main>

<!-- Shared emoji modal -->
<div class="modal" id="emoji-modal" hidden>
  <div class="modal-card" role="dialog" aria-label="Pick an emoji">
    <div class="modal-header">
      <input class="emoji-search" id="emoji-search" type="text" autocomplete="off" spellcheck="false" placeholder="Search emoji...">
      <button type="button" class="modal-action" id="emoji-clear">None</button>
      <button type="button" class="modal-action" id="emoji-close">Close</button>
    </div>
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>
</div>

<footer class="site-footer">
  <a class="footer-link" href="/privacy">Privacy</a>
</footer>

<script>
    // <answer>
    const todayMMDD = (now, utc)=>{
  const month = utc ? now.getUTCMonth() : now.getMonth();
  const day = utc ? now.getUTCDate() : now.getDate();
  return `${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
};
    const mergeConditional = (params, fallback)=>({
    answer: (params.get("answer") ?? fallback.answer).toUpperCase(),
    answer2: (params.get("answer2") ?? fallback.answer2 ?? "").toUpperCase(),
    date: params.get("date") ?? fallback.date ?? ""
  });
    const readConditional = (params)=>mergeConditional(params, {
    answer: "YES"
  });
    const isConditional = (input)=>/^\d{2}-\d{2}$/.test(input.date) && input.answer2.length > 0;
    const resolveAnswer = (input, mmdd)=>{
  const valid = /^\d{2}-\d{2}$/.test(input.date) && input.answer2.length > 0;
  if (!valid) return input.answer;
  return mmdd === input.date ? input.answer : input.answer2;
};
    // </answer>

    // <url>
    const URL_KEYS = ["day","answer","answer2","date","emoji","color","qcolor","bg"];
    const buildUrlParts = (state)=>{
  const parts = [];
  for (const k of URL_KEYS){
    const v = state[k];
    if (v) parts.push(`${k}=${encodeURIComponent(v)}`);
  }
  return parts;
};
    const stateFromParams = (params)=>{
  const state = {};
  for (const k of URL_KEYS){
    const v = params.get(k);
    if (v) state[k] = v;
  }
  return state;
};
    // </url>

    // <presets>
    const rawPresets = [
      {"day":"workout","answer":"YES"},
      {"day":"pizza","answer":"YES","emoji":"🍕","color":"#dc2626","qcolor":"#3f2a14","bg":"#fdf6e3"},
      {"day":"pajama","answer":"ALWAYS","emoji":"😴","color":"#a78bfa","qcolor":"#c7d2fe","bg":"#1e1b4b"},
      {"day":"coffee","answer":"YES","emoji":"☕","color":"#8b4513","qcolor":"#3d2817","bg":"#f3e8d5"},
      {"day":"slay","answer":"YES","color":"#ec4899","qcolor":"#f5f5f0","bg":"#0a0a0a"},
      {"day":"your birth","answer":"YES","emoji":"🎂","color":"#ec4899","qcolor":"#581c87","bg":"#fef9c3"},
      {"day":"doomscroll","answer":"ALAS","emoji":"📱","color":"#ef4444","qcolor":"#9ca3af","bg":"#111827"},
      {"day":"good","answer":"YES","emoji":"😊","color":"#f59e0b","qcolor":"#78350f","bg":"#fef3c7"},
      {"day":"leg","answer":"YES","emoji":"🦵","color":"#0891b2","qcolor":"#164e63","bg":"#ecfeff"},
      {"day":"mercury retrograde","answer":"NO","color":"#991b1b","qcolor":"#2a1810","bg":"#f0e6d2"},
      {"day":"taco","answer":"SÍ","emoji":"🌮","color":"#ea580c","qcolor":"#3f2a14","bg":"#fef3c7"},
      {"day":"monday","answer":"UGH","emoji":"😩","color":"#475569","qcolor":"#1e293b","bg":"#e2e8f0"},
      {"day":"friday","answer":"YES","emoji":"🎉","color":"#f59e0b","qcolor":"#78350f","bg":"#fef3c7"},
      {"day":"hump day","answer":"YES","emoji":"🐪","color":"#d97706","qcolor":"#451a03","bg":"#fef3c7"},
      {"day":"payday","answer":"SOON","emoji":"💸","color":"#16a34a","qcolor":"#14532d","bg":"#dcfce7"},
      {"day":"sunday scaries","answer":"YES","emoji":"😰","color":"#1e40af","qcolor":"#1e3a8a","bg":"#dbeafe"},
      {"day":"brunch","answer":"YES","emoji":"🥐","color":"#ea580c","qcolor":"#7c2d12","bg":"#fed7aa"},
      {"day":"nap","answer":"ALWAYS","emoji":"🛌","color":"#0891b2","qcolor":"#164e63","bg":"#cffafe"},
      {"day":"sick day","answer":"WISH","emoji":"🤒","color":"#65a30d","qcolor":"#365314","bg":"#ecfccb"},
      {"day":"snow day","answer":"NO","emoji":"❄️","color":"#0284c7","qcolor":"#0c4a6e","bg":"#e0f2fe"},
      {"day":"valentines","answer":"YES","answer2":"NO","date":"02-14","emoji":"💝","color":"#e11d48","qcolor":"#881337","bg":"#fff1f2"},
      {"day":"kanelbullens","answer":"JA","answer2":"NEJ","date":"10-04","color":"#a16207","qcolor":"#451a03","bg":"#fef3c7"},
      {"day":"syttende mai","answer":"JA","answer2":"NEI","date":"05-17","emoji":"🇳🇴","color":"#ba0c2f","qcolor":"#00205b","bg":"#f5f5f0"},
    ];
    // </presets>

  const params = new URLSearchParams(location.search);
  const fromPath = decodeURIComponent(location.pathname).replace(/^\/+|\/+$/g, "");
  const name = fromPath.replace(/[-_+]+/g, " ").trim();
  const activePreset = name ? rawPresets.find((p) => p.day === name) : undefined;
  const cond = activePreset ? mergeConditional(params, activePreset) : readConditional(params);
  const resolvedAnswer = resolveAnswer(cond, todayMMDD(new Date(), false));
  const emoji = params.get("emoji") ?? activePreset?.emoji ?? "";
  const color = params.get("color");
  const qcolor = params.get("qcolor");
  const bg = params.get("bg");

  const q = document.getElementById("q");
  const a = document.getElementById("a");
  const e = document.getElementById("e");
  const composer = document.getElementById("composer");
  const f = document.getElementById("f");
  const i = document.getElementById("i");
  const ai = document.getElementById("ai");
  const emi = document.getElementById("emi");
  const ci = document.getElementById("ci");
  const qci = document.getElementById("qci");
  const bgi = document.getElementById("bgi");

  const root = document.documentElement;
  const cs = getComputedStyle(root);
  const toHex = (val) => {
    const s = val.trim();
    if (s.startsWith("#")) return s.length === 4
      ? "#" + s.slice(1).split("").map((c) => c + c).join("")
      : s.toLowerCase();
    const m = s.match(/rgba?\(([^)]+)\)/i);
    if (!m) return s.toLowerCase();
    const [r, g, b] = m[1].split(",").map((n) => parseInt(n.trim(), 10));
    return "#" + [r, g, b].map((n) => n.toString(16).padStart(2, "0")).join("");
  };
  const defaults = {
    accent: toHex(cs.getPropertyValue("--accent")),
    fg: toHex(cs.getPropertyValue("--fg")),
    bg: toHex(cs.getPropertyValue("--bg")),
  };

  const faviconLink = document.querySelector("link[rel='icon']");
  const setFavicon = ({ emoji, accent, bg }) => {
    const svg = emoji
      ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text x="50%" y="54" text-anchor="middle" font-size="54">${emoji}</text></svg>`
      : `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="${accent}"/><text x="50%" y="48" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="900" font-size="56" fill="${bg}">Y</text></svg>`;
    faviconLink.type = "image/svg+xml";
    faviconLink.href = "data:image/svg+xml," + encodeURIComponent(svg);
  };

  if (name) {
    document.body.classList.add("view-answer");
    const ql = document.getElementById("ql");
    ql.hidden = false;
    const editParams = new URLSearchParams(params);
    editParams.set("day", name);
    ql.href = "/?" + editParams.toString();
    a.hidden = false;
    q.textContent = `Is it ${name} day today?`;
    a.textContent = resolvedAnswer;
    if (emoji) {
      e.textContent = emoji;
      e.hidden = false;
    }
    document.title = `Is it ${name} day today? ${resolvedAnswer}`;
    if (color) root.style.setProperty("--accent", color);
    if (qcolor) root.style.setProperty("--fg", qcolor);
    if (bg) root.style.setProperty("--bg", bg);
    setFavicon({ emoji, accent: color || defaults.accent, bg: bg || defaults.bg });
    const s = document.getElementById("s");
    s.hidden = false;
    const ad = document.getElementById("ad");
    ad.hidden = false;
    (window.adsbygoogle = window.adsbygoogle || []).push({});
    const copyFallback = (text) => {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      let ok = false;
      try { ok = document.execCommand("copy"); } catch {}
      document.body.removeChild(ta);
      return ok;
    };
    const flash = (label) => {
      const prev = s.textContent;
      s.textContent = label;
      s.classList.add("copied");
      setTimeout(() => {
        s.textContent = prev;
        s.classList.remove("copied");
      }, 1800);
    };
    s.addEventListener("click", async () => {
      const url = location.href;
      if (navigator.share) {
        try {
          await navigator.share({ url });
          return;
        } catch (err) {
          if (err && err.name === "AbortError") return;
        }
      }
      let copied = false;
      if (navigator.clipboard?.writeText) {
        try {
          await navigator.clipboard.writeText(url);
          copied = true;
        } catch {}
      }
      if (!copied) copied = copyFallback(url);
      flash(copied ? "Copied!" : "Copy failed");
    });
  } else {
    document.body.classList.add("view-edit");
    composer.hidden = false;
    const emiBtn = document.getElementById("emi-btn");
    const setEmoji = (val) => {
      emi.value = val;
      emiBtn.textContent = val || "＋ emoji";
      emiBtn.classList.toggle("empty", !val);
      setFavicon({ emoji: val, accent: ci.value || defaults.accent, bg: bgi.value || defaults.bg });
      syncUrl();
    };

    const di = document.getElementById("di");
    const ai2 = document.getElementById("ai2");
    const condRow = document.getElementById("cond-row");
    const condToggle = document.getElementById("cond-toggle");
    const condRemove = document.getElementById("cond-remove");
    const currentYear = new Date().getFullYear();
    const mmddToInput = (mmdd) => `${currentYear}-${mmdd}`;
    const inputToMMDD = (val) => val ? val.slice(5) : "";
    const setConditional = (mmdd, alt) => {
      const on = !!mmdd;
      condRow.hidden = !on;
      condToggle.hidden = on;
      if (on) {
        di.value = mmddToInput(mmdd);
        ai2.value = (alt || "NO").toUpperCase();
      } else {
        di.value = "";
        ai2.value = "NO";
      }
      syncUrl();
    };
    condToggle.addEventListener("click", () => {
      const now = new Date();
      const mmdd = `${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
      setConditional(mmdd, ai2.value || "NO");
    });
    condRemove.addEventListener("click", () => setConditional("", ""));

    const editorState = (includeDay) => {
      const state = {};
      if (includeDay) {
        const day = i.value.trim();
        if (day) state.day = day;
      }
      const ans = ai.value.trim();
      if (ans && ans.toUpperCase() !== "YES") state.answer = ans;
      const emo = emi.value.trim();
      if (emo) state.emoji = emo;
      if (ci.value.toLowerCase() !== defaults.accent.toLowerCase()) state.color = ci.value;
      if (qci.value.toLowerCase() !== defaults.fg.toLowerCase()) state.qcolor = qci.value;
      if (bgi.value.toLowerCase() !== defaults.bg.toLowerCase()) state.bg = bgi.value;
      if (!condRow.hidden) {
        const mmdd = inputToMMDD(di.value);
        const alt = ai2.value.trim();
        if (/^\d{2}-\d{2}$/.test(mmdd) && alt) {
          state.date = mmdd;
          state.answer2 = alt;
        }
      }
      return state;
    };
    const syncUrl = () => {
      const parts = buildUrlParts(editorState(true));
      history.replaceState(null, "", "/" + (parts.length ? "?" + parts.join("&") : ""));
    };
    for (const el of [i, ai, di, ai2]) {
      el.addEventListener("input", syncUrl);
    }

    const swatchBtns = {
      qci: document.getElementById("qci-btn"),
      ci: document.getElementById("ci-btn"),
      bgi: document.getElementById("bgi-btn"),
    };
    const liveApply = () => {
      root.style.setProperty("--fg", qci.value);
      root.style.setProperty("--accent", ci.value);
      root.style.setProperty("--bg", bgi.value);
      swatchBtns.qci.style.background = qci.value;
      swatchBtns.ci.style.background = ci.value;
      swatchBtns.bgi.style.background = bgi.value;
      setFavicon({ emoji: emi.value, accent: ci.value, bg: bgi.value });
      syncUrl();
    };
    for (const [key, btn] of Object.entries(swatchBtns)) {
      const input = { qci, ci, bgi }[key];
      btn.addEventListener("click", () => input.click());
      input.addEventListener("input", liveApply);
      input.addEventListener("change", liveApply);
    }

    const presets = rawPresets.map((p) => ({
      emoji: "",
      color: defaults.accent,
      qcolor: defaults.fg,
      bg: defaults.bg,
      date: "",
      answer2: "",
      ...p,
    }));
    const apply = (p) => {
      i.value = p.day;
      ai.value = p.answer;
      setEmoji(p.emoji);
      ci.value = p.color;
      qci.value = p.qcolor;
      bgi.value = p.bg;
      setConditional(p.date || "", p.answer2 || "");
      liveApply();
    };
    const initial = params.has("day") ? {
      day: params.get("day") ?? "",
      answer: (params.get("answer") ?? "YES").toUpperCase(),
      emoji: params.get("emoji") ?? "",
      color: params.get("color") ?? defaults.accent,
      qcolor: params.get("qcolor") ?? defaults.fg,
      bg: params.get("bg") ?? defaults.bg,
      date: /^\d{2}-\d{2}$/.test(params.get("date") ?? "") ? params.get("date") : "",
      answer2: (params.get("answer2") ?? "").toUpperCase(),
    } : presets[0];
    apply(initial);

    const presetsEl = document.getElementById("presets");
    for (const p of presets) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "preset";
      btn.style.background = p.bg;
      btn.style.color = p.qcolor;
      btn.style.borderColor = `color-mix(in srgb, ${p.qcolor} 20%, transparent)`;
      const top = document.createElement("div");
      top.className = "preset-top";
      if (p.emoji) {
        const em = document.createElement("span");
        em.className = "preset-emoji";
        em.textContent = p.emoji;
        top.appendChild(em);
      }
      const day = document.createElement("span");
      day.className = "preset-day";
      day.textContent = p.day;
      top.appendChild(day);
      btn.appendChild(top);
      const ans = document.createElement("span");
      ans.className = "preset-answer";
      ans.style.color = p.color;
      ans.textContent = p.answer;
      btn.appendChild(ans);
      btn.addEventListener("click", () => {
        apply(p);
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      presetsEl.appendChild(btn);
    }
    document.getElementById("random-btn").addEventListener("click", () => {
      const pool = presets.filter((p) => p.day !== i.value);
      apply(pool[Math.floor(Math.random() * pool.length)]);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    const modal = document.getElementById("emoji-modal");
    const grid = document.getElementById("emoji-grid");
    const search = document.getElementById("emoji-search");
    const closeModal = () => { modal.hidden = true; };
    const openModal = () => {
      modal.hidden = false;
      search.value = "";
      filter("");
      setTimeout(() => search.focus(), 0);
      ensureEmojis();
    };
    const filter = (term) => {
      const q = term.trim().toLowerCase();
      let any = false;
      for (const child of grid.children) {
        if (child.dataset.k === undefined) continue;
        const match = !q || child.dataset.k.includes(q);
        child.hidden = !match;
        if (match) any = true;
      }
      const emptyEl = grid.querySelector(".emoji-empty");
      if (emptyEl) emptyEl.hidden = any;
    };
    const renderEmojis = () => {
      grid.textContent = "";
      const frag = document.createDocumentFragment();
      for (const [ch, k] of window.EMOJIS) {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "emoji-cell";
        cell.textContent = ch;
        cell.dataset.k = k;
        cell.title = k;
        cell.addEventListener("click", () => {
          setEmoji(ch);
          closeModal();
        });
        frag.appendChild(cell);
      }
      const empty = document.createElement("div");
      empty.className = "emoji-empty";
      empty.textContent = "no matches";
      empty.hidden = true;
      frag.appendChild(empty);
      grid.appendChild(frag);
    };
    let loadStarted = false;
    const ensureEmojis = () => {
      if (window.EMOJIS) { if (!grid.children.length) renderEmojis(); return; }
      if (loadStarted) return;
      loadStarted = true;
      const s = document.createElement("script");
      s.src = "/emojis.js";
      s.onload = () => renderEmojis();
      document.head.appendChild(s);
    };
    emiBtn.addEventListener("click", openModal);
    document.getElementById("emoji-close").addEventListener("click", closeModal);
    document.getElementById("emoji-clear").addEventListener("click", () => { setEmoji(""); closeModal(); });
    modal.addEventListener("click", (ev) => { if (ev.target === modal) closeModal(); });
    search.addEventListener("input", () => filter(search.value));
    document.addEventListener("keydown", (ev) => { if (ev.key === "Escape" && !modal.hidden) closeModal(); });

    f.addEventListener("submit", (ev) => {
      ev.preventDefault();
      const day = i.value.trim();
      if (!day) { i.focus(); return; }
      const parts = buildUrlParts(editorState(false));
      const qs = parts.length ? "?" + parts.join("&") : "";
      location.href = "/" + encodeURIComponent(day) + qs;
    });
  }
</script>
</body>
</html>
